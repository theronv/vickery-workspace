<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vickery Digital — Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@500;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #f97316;
  --orange-dim: rgba(249,115,22,0.10);
  --orange-border: rgba(249,115,22,0.35);
  --bg: #0d0f14;
  --surface: #13161d;
  --surface2: #1a1e27;
  --surface3: #1f2330;
  --border: rgba(255,255,255,0.07);
  --border-md: rgba(255,255,255,0.11);
  --text: #e8e6df;
  --text-muted: #6b7280;
  --text-dim: #3d4250;
  --green: #22c55e;
  --amber: #f59e0b;
  --red: #ef4444;
  --panel-w: 380px;
  --admin-w: 340px;
}

html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', system-ui, sans-serif; height: 100vh; overflow: hidden; }

#auth-screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg); z-index: 1000; gap: 32px;
}
.auth-logo { font-family: 'Fira Code', monospace; font-size: 12px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--orange); }
.auth-title { font-family: 'Cabinet Grotesk', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); text-align: center; line-height: 1.2; }
.auth-sub { font-size: 14px; color: var(--text-muted); text-align: center; }

#login-form {
  display: flex; flex-direction: column; gap: 12px; width: 300px;
}
.login-input {
  background: var(--surface); border: 1px solid var(--border-md); border-radius: 8px; padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.15s;
}
.login-input:focus { border-color: var(--orange); }
.login-btn {
  background: var(--orange); border: none; border-radius: 8px; padding: 12px; color: #fff; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
}
.login-btn:hover { opacity: 0.9; }

#app { display: none; height: 100vh; width: 100vw; }
#app.visible { display: flex; }

.workspace { display: flex; height: 100vh; width: 100vw; overflow: hidden; }

.launchpad { flex: 1; min-width: 0; overflow-y: auto; overflow-x: hidden; padding: 32px 28px 60px; }
.launchpad.dimmed { filter: brightness(0.4); pointer-events: none; user-select: none; }
.launchpad::-webkit-scrollbar { width: 4px; }
.launchpad::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }
.launchpad-inner { max-width: 760px; margin: 0 auto; }

.drag-handle { width: 5px; background: var(--border); cursor: col-resize; flex-shrink: 0; transition: background 0.15s; z-index: 10; }
.drag-handle:hover, .drag-handle.dragging { background: var(--orange-border); }

.panel { display: flex; flex-direction: column; flex-shrink: 0; background: #0f1119; border-left: 1px solid var(--border-md); overflow: hidden; min-width: 260px; max-width: 60vw; width: var(--panel-w); }
.panel.hidden { display: none; }

.panel-header { display: flex; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); padding: 0 10px 0 0; }
.panel-tabs { display: flex; flex: 1; overflow-x: auto; scrollbar-width: none; }
.panel-tabs::-webkit-scrollbar { display: none; }
.panel-tab { display: flex; align-items: center; gap: 6px; padding: 10px 13px; font-size: 12px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.13s, border-color 0.13s; background: none; border-top: none; border-left: none; border-right: none; font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
.panel-tab:hover { color: var(--text); }
.panel-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
.panel-controls { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.panel-btn { background: transparent; border: 1px solid var(--border); border-radius: 5px; width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 12px; transition: border-color 0.13s, color 0.13s, background 0.13s; }
.panel-btn:hover { border-color: var(--border-md); color: var(--text); background: var(--surface2); }
.panel-btn.close-btn:hover { border-color: rgba(239,68,68,0.4); color: var(--red); background: rgba(239,68,68,0.08); }
.panel-body { flex: 1; position: relative; overflow: hidden; }
.iframe-layer { position: absolute; inset: 0; display: none; }
.iframe-layer.active { display: block; }
.panel-iframe { width: 100%; height: 100%; border: none; }
.iframe-loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: #0f1119; z-index: 5; transition: opacity 0.3s; }
.iframe-loading.hidden { opacity: 0; pointer-events: none; }
.loader-ring { width: 28px; height: 28px; border: 2px solid var(--border-md); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-label { font-family: 'Fira Code', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; }
.iframe-error { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: #0f1119; text-align: center; padding: 28px; }
.iframe-error.visible { display: flex; }
.iframe-error-icon { font-size: 26px; }
.iframe-error-title { font-size: 13px; font-weight: 600; color: var(--text-muted); }
.iframe-error-msg { font-size: 12px; color: var(--text-dim); line-height: 1.6; }
.iframe-error-link { font-size: 12px; color: var(--orange); text-decoration: none; }
.iframe-error-link:hover { text-decoration: underline; }

.header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; }
.header-left { display: flex; flex-direction: column; gap: 3px; }
.wordmark { font-family: 'Fira Code', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--orange); }
.greeting { font-family: 'Cabinet Grotesk', sans-serif; font-size: 22px; font-weight: 700; line-height: 1.2; }
.greeting span { color: var(--orange); }
.header-right { display: flex; align-items: center; gap: 12px; }
.time-block { text-align: right; }
.clock { font-family: 'Fira Code', monospace; font-size: 18px; font-weight: 500; }
.date-str { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: 'Fira Code', monospace; }

.user-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: border-color 0.13s; }
.user-btn:hover { border-color: var(--border-md); }
.user-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--orange-dim); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--orange); overflow: hidden; }
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-name { font-size: 12px; font-weight: 500; color: var(--text-muted); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sign-out-btn { font-size: 11px; color: var(--text-dim); background: none; border: none; cursor: pointer; padding: 0; font-family: 'DM Sans', sans-serif; }
.sign-out-btn:hover { color: var(--red); }

.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; margin-top: 26px; display: flex; align-items: center; gap: 10px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.legend { display: flex; gap: 14px; margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
.legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 8px; }
.app-card { background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 15px 13px 12px; cursor: pointer; text-decoration: none; color: inherit; display: block; transition: border-color 0.15s, background 0.15s, transform 0.1s; position: relative; }
.app-card:hover { border-color: var(--orange-border); background: var(--surface2); transform: translateY(-1px); }
.app-card.placeholder { border-style: dashed; cursor: default; }
.app-card.placeholder:hover { transform: none; border-color: var(--border); background: var(--surface); }
.app-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; margin-bottom: 9px; }
.app-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.app-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
.status-dot { position: absolute; top: 11px; right: 11px; width: 7px; height: 7px; border-radius: 50%; }
.status-live { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
.status-dev  { background: var(--amber); }
.status-idea { background: var(--text-dim); }

.tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(125px, 1fr)); gap: 7px; }
.tool-link { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 8px 11px; text-decoration: none; color: var(--text-muted); font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 7px; transition: border-color 0.15s, color 0.15s, background 0.15s; }
.tool-link:hover { color: var(--text); border-color: var(--orange-border); background: var(--surface2); }
.tool-icon { font-size: 12px; width: 14px; text-align: center; flex-shrink: 0; }

.custom-tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(125px, 1fr)); gap: 7px; }
.custom-tool-card { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 8px 11px; color: var(--text-muted); font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 7px; transition: border-color 0.15s, color 0.15s; position: relative; }
.custom-tool-card:hover { border-color: var(--border-md); }
.custom-tool-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.custom-tool-actions { display: flex; gap: 3px; opacity: 0; transition: opacity 0.13s; }
.custom-tool-card:hover .custom-tool-actions { opacity: 1; }
.tool-action-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; width: 22px; height: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 10px; transition: border-color 0.12s, color 0.12s; flex-shrink: 0; text-decoration: none; }
.tool-action-btn:hover { border-color: var(--orange-border); color: var(--orange); }

.skeleton { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; height: 38px; animation: shimmer 1.4s ease-in-out infinite; }
@keyframes shimmer { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

.footer { margin-top: 36px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.footer-left { font-size: 11px; color: var(--text-dim); font-family: 'Fira Code', monospace; }
.budget-bar-wrap { display: flex; align-items: center; gap: 8px; }
.budget-label { font-size: 11px; color: var(--text-muted); font-family: 'Fira Code', monospace; }
.budget-bar { width: 80px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.budget-fill { height: 100%; background: var(--green); border-radius: 2px; width: 32%; }
.budget-amt { font-size: 11px; color: var(--text-muted); font-family: 'Fira Code', monospace; }

.open-panel-btn { position: fixed; bottom: 72px; right: 20px; z-index: 90; background: var(--surface2); border: 1px solid var(--border-md); border-radius: 8px; padding: 7px 13px; cursor: pointer; display: none; align-items: center; gap: 7px; color: var(--text-muted); font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif; transition: border-color 0.13s, color 0.13s; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
.open-panel-btn.visible { display: flex; }
.open-panel-btn:hover { border-color: var(--orange-border); color: var(--orange); }

.admin-btn { position: fixed; bottom: 22px; right: 22px; z-index: 100; background: var(--surface2); border: 1px solid var(--border-md); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 15px; transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.2s; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
.admin-btn:hover { background: var(--orange-dim); border-color: var(--orange-border); color: var(--orange); transform: rotate(35deg); }

.admin-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.admin-overlay.open { opacity: 1; pointer-events: all; }
.admin-sidebar { position: fixed; top: 0; right: 0; bottom: 0; width: var(--admin-w); background: #111318; border-left: 1px solid var(--border-md); z-index: 300; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.28s cubic-bezier(0.22,1,0.36,1); }
.admin-sidebar.open { transform: translateX(0); }
.admin-header { padding: 20px 18px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.admin-title { font-family: 'Cabinet Grotesk', sans-serif; font-size: 15px; font-weight: 700; }
.admin-close { background: transparent; border: 1px solid var(--border); border-radius: 5px; width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 12px; transition: border-color 0.13s, color 0.13s; }
.admin-close:hover { border-color: var(--border-md); color: var(--text); }
.admin-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 18px; }
.admin-body::-webkit-scrollbar { width: 3px; }
.admin-body::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }
.sb-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
.add-form { display: flex; flex-direction: column; gap: 10px; }
.form-field { display: flex; flex-direction: column; gap: 4px; }
.form-label { font-size: 11px; color: var(--text-muted); font-family: 'Fira Code', monospace; }
.form-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 8px 11px; color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.13s; width: 100%; }
.form-input::placeholder { color: var(--text-dim); }
.form-input:focus { border-color: var(--orange-border); }
.emoji-picker { display: flex; flex-wrap: wrap; gap: 4px; }
.emoji-opt { width: 29px; height: 29px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: border-color 0.12s; }
.emoji-opt:hover { border-color: var(--border-md); }
.emoji-opt.selected { border-color: var(--orange-border); background: var(--orange-dim); }
.group-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.group-tab { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 3px 9px; font-size: 11px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.12s; font-family: 'DM Sans', sans-serif; }
.group-tab:hover { color: var(--text); border-color: var(--border-md); }
.group-tab.active { background: var(--orange-dim); border-color: var(--orange-border); color: var(--orange); }
.btn-add { background: var(--orange); border: none; border-radius: 7px; padding: 9px 14px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.13s; font-family: 'DM Sans', sans-serif; width: 100%; }
.btn-add:hover { opacity: 0.87; }
.btn-add:disabled { opacity: 0.35; cursor: default; }
.btn-add.saving { opacity: 0.6; cursor: default; }
.links-list { display: flex; flex-direction: column; gap: 5px; }
.link-row { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 9px 10px; display: flex; align-items: center; gap: 7px; }
.link-row-icon { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }
.link-row-info { flex: 1; min-width: 0; }
.link-row-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.link-row-meta { font-size: 10px; color: var(--text-dim); font-family: 'Fira Code', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.link-row-actions { display: flex; gap: 3px; flex-shrink: 0; }
.icon-btn { background: transparent; border: 1px solid var(--border); border-radius: 4px; width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 10px; transition: border-color 0.12s, color 0.12s, background 0.12s; }
.icon-btn:hover { border-color: var(--border-md); color: var(--text); background: var(--surface2); }
.icon-btn.del:hover { border-color: rgba(239,68,68,0.4); color: var(--red); background: rgba(239,68,68,0.08); }
.icon-btn.mv:hover { border-color: var(--orange-border); color: var(--orange); }
.empty-list { text-align: center; padding: 20px 0; font-size: 12px; color: var(--text-dim); line-height: 1.7; }
.sb-divider { height: 1px; background: var(--border); margin: 0 -16px; }
.api-error { font-size: 11px; color: var(--red); text-align: center; padding: 8px; background: rgba(239,68,68,0.08); border-radius: 6px; border: 1px solid rgba(239,68,68,0.2); }

.link-row.active-panel { border-color: var(--orange-border); background: var(--orange-dim); }
.panel-toggle-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 9px;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
}
.panel-toggle-btn.active {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
}
.link-edit-form {
    display: none;
    flex-direction: column;
    gap: 8px;
    padding: 12px;
    background: var(--surface2);
    border-radius: 8px;
    margin-bottom: 8px;
    border: 1px solid var(--orange-border);
}
.link-edit-form.open { display: flex; }
.edit-actions { display: flex; gap: 6px; margin-top: 4px; }
.btn-save-edit { background: var(--orange); border: none; border-radius: 4px; padding: 6px 10px; color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; }
.btn-cancel-edit { background: var(--surface3); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; color: var(--text-muted); font-size: 11px; cursor: pointer; }

.search-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.search-input-field { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 8px 12px; color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.15s; }
.search-input-field::placeholder { color: var(--text-dim); }
.search-input-field:focus { border-color: var(--orange-border); }
.search-kbd { font-family: 'Fira Code', monospace; font-size: 10px; color: var(--text-dim); background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; flex-shrink: 0; pointer-events: none; }
.search-no-results { font-size: 12px; color: var(--text-dim); text-align: center; padding: 14px 0; }

.favicon-img { width: 14px; height: 14px; border-radius: 2px; vertical-align: middle; }
.link-row-favicon { width: 14px; height: 14px; border-radius: 2px; vertical-align: middle; }
.panel-tab-favicon { width: 12px; height: 12px; border-radius: 2px; vertical-align: middle; }
/* ── NEW RESIZABLE LAYOUT STYLES ── */
#main-layout { display: flex; height: 100vh; width: 100vw; background-color: var(--bg); color: var(--text); }
#main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#resizable-panel-group {
    display: flex;
    height: 100%;
    width: 100%;
    position: relative;
    overflow: hidden;
}
.resizable-panel {
    min-width: 240px;
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
    position: relative;
    background: var(--bg);
    border-right: 1px solid var(--border);
}
.resizable-panel:last-child { border-right: none; }
.resizable-panel-content {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    position: relative;
}
.panel-iframe-wrapper {
    width: 100%;
    height: 100%;
    border: none;
    background-color: var(--surface);
    display: block;
}
.panel-drag-handle {
    width: 6px;
    cursor: ew-resize;
    position: absolute;
    top: 0;
    right: -3px;
    bottom: 0;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.2s ease, background-color 0.2s ease;
}
.resizable-panel:not(.dragging) .panel-drag-handle:hover,
.resizable-panel.resizing .panel-drag-handle {
    opacity: 1;
    background-color: var(--orange-border);
}
.panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    cursor: grab;
    user-select: none;
    flex-shrink: 0;
}
.panel-header:active { cursor: grabbing; }
.panel-header-title {
    font-weight: 600;
    font-size: 0.85em;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Fira Code', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.panel-remove-btn {

<script>
const API_BASE = 'https://workspace-api.vercel.app'

const DEFAULT_PANEL_APPS = [
  { name: 'Nexus Chat',  url: 'https://the-nexus-chat.lovable.app/',  icon: '💬', group: 'Panel' },
  { name: 'KanbanFlow',  url: 'https://my-kanbanflow.lovable.app/',   icon: '📋', group: 'Panel' },
  { name: 'Pastewise',   url: 'http://pastewise.lovable.app/',         icon: '📎', group: 'Panel' },
]

const EMOJIS = ['🔗','🛠','📊','📋','💬','📎','🗂','⚡','🔍','📌','🧩','🎯','📬','🔐','🌐','📡','🧪','🗒','💡','🏗','🎨','🚀']
const GROUPS = ['Apps','Dev','My Tools','AI','Research','Business','Other','Panel']

let tools = [], panelTools = [], selectedEmoji = EMOJIS[0], addGroup = GROUPS[0]
let filterGroup = 'all', activeTabId = null, panelVisible = true

// ── PANEL LAYOUT STATE ──
let panelLayout = []; // Array of panel IDs
let panelSizes = {}; // { id: percentage_width }
const MIN_PANEL_WIDTH_PX = 240;

function savePanelLayout() {
    localStorage.setItem('vickery_panel_layout', JSON.stringify(panelLayout));
    localStorage.setItem('vickery_panel_sizes', JSON.stringify(panelSizes));
}

function loadPanelLayout() {
    try {
        const storedLayout = localStorage.getItem('vickery_panel_layout');
        const storedSizes = localStorage.getItem('vickery_panel_sizes');
        if (storedLayout) panelLayout = JSON.parse(storedLayout);
        if (storedSizes) panelSizes = JSON.parse(storedSizes);
    } catch (e) {
        console.error("Failed to load panel layout:", e);
    }
}

// ── CONTENT GENERATORS ──
function generateLaunchpadHTML() {
    const apps = tools.filter(t => t.group === 'Apps');
    const dev = tools.filter(t => t.group === 'Dev');
    const myTools = tools.filter(t => !['Apps', 'Dev', 'Panel'].includes(t.group));

    return `
    <div class="launchpad" id="launchpad">
        <div class="launchpad-inner">
            <div class="header">
                <div class="header-left">
                    <div class="wordmark">Vickery Digital</div>
                    <div class="greeting">Good <span id="tod">morning</span>, <span id="userName">Theron</span>.</div>
                </div>
                <div class="header-right">
                    <div class="time-block">
                        <div class="clock" id="clock">--:-- --</div>
                        <div class="date-str" id="datestr">---</div>
                    </div>
                    <div>
                        <button class="user-btn" id="userBtn">
                            <div class="user-avatar" id="userAvatar">T</div>
                            <span class="user-name" id="userLabel">Theron</span>

                        <div style="text-align:right;margin-top:3px;">
                            <button class="sign-out-btn" id="signOutBtn">sign out</button>
                        </div>
                    </div>
                </div>
            </div>

            ${apps.length > 0 ? `
            <div class="section-label">Your Apps</div>
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:var(--green);box-shadow:0 0 5px rgba(34,197,94,0.5)"></div>live</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>in dev</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--text-dim)"></div>pipeline</div>
            </div>
            <div class="apps-grid">
                ${apps.map(t => `
                <a class="app-card" href="${esc(t.url)}" target="_blank">
                    <div class="status-dot status-live"></div>
                    <div class="app-icon" style="background:var(--orange-dim);">${t.icon}</div>
                    <div class="app-name">${esc(t.name)}</div>
                    <div class="app-desc">${esc(shortUrl(t.url))}</div>
                </a>`).join('')}
                <div class="app-card placeholder" onclick="openAdmin()">
                    <div class="status-dot status-idea"></div>
                    <div class="app-icon" style="background:rgba(107,114,128,0.08);color:var(--text-dim);font-size:19px;font-weight:300;">+</div>
                    <div class="app-name" style="color:var(--text-muted)">Next App</div>
                    <div class="app-desc">Manage via Link Manager</div>
                </div>
            </div>` : ''}

            ${dev.length > 0 ? `
            <div class="section-label">Dev Console</div>
            <div class="tools-grid">
                ${dev.map(t => `
                <a class="tool-link" href="${esc(t.url)}" target="_blank"><span class="tool-icon">${faviconImgTag(t.url, t.icon, 'favicon-img')}</span> ${esc(t.name)}</a>
                `).join('')}
            </div>` : ''}

            <div class="section-label" id="myToolsLabel">My Tools</div>
            <div class="search-bar" id="searchBar">
                <input type="text" id="searchInput" class="search-input-field" placeholder="Filter links…" autocomplete="off" spellcheck="false">
                <span class="search-kbd" id="searchKbd">/</span>
            </div>
            <div class="custom-tools-grid" id="customToolsGrid">
                ${myTools.map(t => `
                <div class="custom-tool-card">
                    <span class="tool-icon">${faviconImgTag(t.url, t.icon, 'favicon-img')}</span>
                    <span class="custom-tool-label">${esc(t.name)}</span>
                    <div class="custom-tool-actions">
                        <a class="tool-action-btn" href="${esc(t.url)}" target="_blank" rel="noopener" title="Open in new tab">↗</a>
                    </div>
                </div>`).join('')}
            </div>

            <div class="footer">
                <div class="footer-left">vickery-digital · bothell, wa</div>
                <div class="budget-bar-wrap">
                    <div class="budget-label">infra</div>
                    <div class="budget-bar"><div class="budget-fill"></div></div>
                    <div class="budget-amt">~$19 / $60</div>
                </div>
            </div>
        </div>
    </div>`;
}

// ── LAYOUT ENGINE ──
function initResizableLayout() {
    loadPanelLayout();

    const allToolsMap = new Map(tools.map(t => [t.id, t]));
    
    // 1. Identify "Sticky" panels (those in the 'Panel' group)
    const stickyPanelIds = tools.filter(t => t.group === 'Panel').map(t => t.id);
    
    // 2. Filter existing layout to only include links that still exist
    panelLayout = panelLayout.filter(id => id === 'launchpad' || allToolsMap.has(id));
    
    // 3. Ensure all Sticky panels are in the layout
    stickyPanelIds.forEach(id => {
        if (!panelLayout.includes(id)) {
            panelLayout.push(id);
            if (!panelSizes[id]) panelSizes[id] = 0.3;
        }
    });

    // 4. Always ensure launchpad is present and at the start
    if (!panelLayout.includes('launchpad')) {
        panelLayout.unshift('launchpad');
    } else {
        const lpIdx = panelLayout.indexOf('launchpad');
        if (lpIdx !== 0) {
            panelLayout.splice(lpIdx, 1);
            panelLayout.unshift('launchpad');
        }
    }

    renderPanels();
}

function renderPanels() {
    const group = document.getElementById('resizable-panel-group');
    if (!group) return;
    group.innerHTML = '';

    panelLayout.forEach(id => {
        const data = tools.find(t => t.id === id) || (id === 'launchpad' ? { id: 'launchpad', name: 'Launchpad', type: 'fixed', icon: '🏠' } : null);
        if (!data) return;

        const panelDiv = document.createElement('div');
        panelDiv.id = `panel-${data.id}`;
        panelDiv.className = 'resizable-panel';
        panelDiv.dataset.panelId = data.id;

        const currentWidth = panelSizes[data.id] || 0;
        if (currentWidth > 0) {
            panelDiv.style.width = `${currentWidth * 100}%`;
        }

        const isSticky = data.group === 'Panel';

        panelDiv.innerHTML = `
            <div class="panel-header" draggable="true">
                <span class="panel-header-title">
                    <span class="panel-icon">${faviconImgTag(data.url || '', data.icon, 'panel-tab-favicon')}</span>
                    ${esc(data.name)}
                    ${isSticky ? '<span style="font-size:8px;opacity:0.5;margin-left:4px;">DEFAULT</span>' : ''}
                </span>
                <div style="display:flex;gap:4px;">
                    ${data.id !== 'launchpad' ? `
                        <button class="panel-remove-btn" title="Pop out" onclick="window.open('${esc(data.url)}', '_blank')">⤢</button>
                        <button class="panel-remove-btn" title="${isSticky ? 'Hide until next reload' : 'Unpin'}" data-id="${data.id}">✕</button>
                    ` : ''}
                </div>
            </div>
            <div class="resizable-panel-content">
                ${data.type === 'iframe'
                    ? `<iframe class="panel-iframe-wrapper" src="${esc(data.url)}" sandbox="allow-scripts allow-forms allow-popups allow-modals allow-same-origin allow-pointer-lock" loading="lazy"></iframe>`
                    : generateLaunchpadHTML()}
            </div>
            <div class="panel-drag-handle"></div>`;

        group.appendChild(panelDiv);

        if (data.id !== 'launchpad') {
            panelDiv.querySelector('.panel-remove-btn[data-id]').onclick = (e) => {
                e.stopPropagation();
                removePanel(data.id);
            };
        } else {
            attachLaunchpadListeners();
            // No need to call renderMain anymore as generateLaunchpadHTML handles it
            tick(); 
        }

        addPanelDragAndDrop(panelDiv);
        addPanelResizing(panelDiv);
    });

    normalizePanelSizes();
}

function normalizePanelSizes() {
    let currentTotal = panelLayout.reduce((sum, id) => sum + (panelSizes[id] || 0), 0);
    if (currentTotal === 0 && panelLayout.length > 0) {
        panelLayout.forEach(id => panelSizes[id] = 1 / panelLayout.length);
        currentTotal = 1;
    }
    if (Math.abs(currentTotal - 1) > 0.001 && currentTotal > 0) {
        panelLayout.forEach(id => panelSizes[id] /= currentTotal);
    }
    updatePanelWidths();
}

function updatePanelWidths() {
    const group = document.getElementById('resizable-panel-group');
    if (!group) return;
    const totalGroupWidth = group.offsetWidth;

    panelLayout.forEach(id => {
        const panelDiv = document.getElementById(`panel-${id}`);
        if (panelDiv) {
            let targetRatio = panelSizes[id];
            panelDiv.style.width = `${targetRatio * 100}%`;
        }
    });
    savePanelLayout();
}

function removePanel(panelId) {
    if (panelId === 'launchpad') return;
    panelLayout = panelLayout.filter(id => id !== panelId);
    delete panelSizes[panelId];
    renderPanels();
    renderList(); // Update sidebar if open
    savePanelLayout();
}

function addPanelResizing(panelDiv) {
    const handle = panelDiv.querySelector('.panel-drag-handle');
    if (!handle) return;

    let isResizing = false;
    let startX, startWidthRatio;
    let prevPanelId, nextPanelId;
    let prevPanelDiv, nextPanelDiv;

    handle.onmousedown = (e) => {
        isResizing = true;
        startX = e.clientX;
        panelDiv.classList.add('resizing');

        const allPanels = Array.from(document.querySelectorAll('.resizable-panel'));
        const currentIndex = allPanels.indexOf(panelDiv);

        prevPanelDiv = panelDiv;
        prevPanelId = panelDiv.dataset.panelId;

        if (currentIndex < allPanels.length - 1) {
            nextPanelDiv = allPanels[currentIndex + 1];
            nextPanelId = nextPanelDiv.dataset.panelId;
        } else {
            nextPanelDiv = null;
        }

        document.body.style.cursor = 'ew-resize';
        document.body.style.userSelect = 'none';
        
        const onMouseMove = (moveEvent) => {
            if (!isResizing) return;
            const dx = moveEvent.clientX - startX;
            const group = document.getElementById('resizable-panel-group');
            const totalW = group.offsetWidth;

            if (nextPanelDiv) {
                const combinedRatio = panelSizes[prevPanelId] + panelSizes[nextPanelId];
                let newPrevRatio = (prevPanelDiv.offsetWidth + dx) / totalW;
                let newNextRatio = combinedRatio - newPrevRatio;

                const minRatio = MIN_PANEL_WIDTH_PX / totalW;
                if (newPrevRatio < minRatio) {
                    newPrevRatio = minRatio;
                    newNextRatio = combinedRatio - minRatio;
                }
                if (newNextRatio < minRatio) {
                    newNextRatio = minRatio;
                    newPrevRatio = combinedRatio - minRatio;
                }

                panelSizes[prevPanelId] = newPrevRatio;
                panelSizes[nextPanelId] = newNextRatio;

                prevPanelDiv.style.width = `${newPrevRatio * 100}%`;
                nextPanelDiv.style.width = `${newNextRatio * 100}%`;
                startX = moveEvent.clientX;
            }
        };

        const onMouseUp = () => {
            isResizing = false;
            panelDiv.classList.remove('resizing');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            savePanelLayout();
            window.removeEventListener('mousemove', onMouseMove);
            window.removeEventListener('mouseup', onMouseUp);
        };

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        e.preventDefault();
    };
}

function addPanelDragAndDrop(panelDiv) {
    const header = panelDiv.querySelector('.panel-header');
    if (!header) return;

    header.ondragstart = (e) => {
        e.dataTransfer.setData('text/plain', panelDiv.dataset.panelId);
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => panelDiv.classList.add('dragging'), 0);
    };

    header.ondragend = () => {
        panelDiv.classList.remove('dragging');
        document.querySelectorAll('.resizable-panel').forEach(p => {
            p.classList.remove('drag-over-left', 'drag-over-right');
        });
    };

    panelDiv.ondragover = (e) => {
        e.preventDefault();
        const draggingPanel = document.querySelector('.resizable-panel.dragging');
        if (!draggingPanel || draggingPanel === panelDiv) return;

        const rect = panelDiv.getBoundingClientRect();
        const midX = rect.left + rect.width / 2;

        document.querySelectorAll('.resizable-panel').forEach(p => {
            p.classList.remove('drag-over-left', 'drag-over-right');
        });

        if (e.clientX < midX) {
            panelDiv.classList.add('drag-over-left');
        } else {
            panelDiv.classList.add('drag-over-right');
        }
    };

    panelDiv.ondrop = (e) => {
        e.preventDefault();
        const draggedId = e.dataTransfer.getData('text/plain');
        const targetId = panelDiv.dataset.panelId;
        if (draggedId === targetId) return;

        const rect = panelDiv.getBoundingClientRect();
        const midX = rect.left + rect.width / 2;
        const insertBefore = e.clientX < midX;

        const oldIndex = panelLayout.indexOf(draggedId);
        if (oldIndex === -1) return;
        panelLayout.splice(oldIndex, 1);

        let newIndex = panelLayout.indexOf(targetId);
        if (!insertBefore) newIndex++;
        panelLayout.splice(newIndex, 0, draggedId);

        renderPanels();
        savePanelLayout();
    };
}

function attachLaunchpadListeners() {
    const signOutBtn = document.getElementById('signOutBtn');
    if (signOutBtn) signOutBtn.onclick = () => {
        localStorage.removeItem('workspace_access_key');
        window.location.reload();
    };

    const searchInput = document.getElementById('searchInput');
    if (searchInput) searchInput.oninput = (e) => {
        searchQuery = e.target.value.trim();
        renderMain();
    };

    const userBtn = document.getElementById('userBtn');
    if (userBtn) userBtn.onclick = openAdmin;
}

function getToken() {
  return localStorage.getItem('workspace_access_key')
}

function showApp(prefetchedLinks) {
  document.getElementById('auth-screen').style.display = 'none'
  document.getElementById('app').classList.add('visible')

  tick()
  setInterval(tick, 30000)
  loadLinks(prefetchedLinks)
  renderEmojis()
  renderAddTabs()
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault()
  const key = document.getElementById('access-key').value.trim()
  if (!key) return

  localStorage.setItem('workspace_access_key', key)
  try {
    const links = await apiFetch('/api/links')
    showApp(links)
  } catch (err) {
    const errEl = document.getElementById('login-error')
    errEl.textContent = 'Invalid key or connection error: ' + err.message
    errEl.style.display = 'block'
    localStorage.removeItem('workspace_access_key')
  }
})

// Check for existing session on load
window.addEventListener('DOMContentLoaded', async () => {
  if (getToken()) {
    try {
      const links = await apiFetch('/api/links')
      showApp(links)
    } catch (err) {
      localStorage.removeItem('workspace_access_key')
    }
  }
})

// ── CLOCK ──
function tick() {
  const clock = document.getElementById('clock');
  const datestr = document.getElementById('datestr');
  const tod = document.getElementById('tod');
  if (!clock || !datestr || !tod) return;

  const now = new Date(), h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0')
  clock.textContent = (h%12||12)+':'+m+' '+(h>=12?'PM':'AM')
  const D=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
  datestr.textContent = D[now.getDay()]+' · '+M[now.getMonth()]+' '+now.getDate()
  tod.textContent = h<12?'morning':h<17?'afternoon':'evening'
}

// ── API ──
async function apiFetch(path, options = {}) {
  const token = getToken()
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(options.headers||{}) },
  })
  if (!res.ok) throw new Error(`API ${res.status}`)
  return res.json()
}

async function loadLinks(prefetched) {
  try {
    tools = prefetched || await apiFetch('/api/links')

    if (!tools.some(t => t.group === 'Panel') && !localStorage.getItem('panel_seeded')) {
      for (const d of DEFAULT_PANEL_APPS) {
        const link = await apiFetch('/api/links', { method: 'POST', body: JSON.stringify(d) })
        tools.push(link)
      }
      localStorage.setItem('panel_seeded', '1')
    }

    derivePanelTools()
    initResizableLayout()
    renderList()
    renderFilterTabs()
  } catch(e) {
    console.error("Load links failed:", e);
  }
}

function derivePanelTools() {
  panelTools = tools.filter(t => t.group === 'Panel').sort((a, b) => Number(a.position) - Number(b.position))
}

// ── FAVICON HELPER ──
function faviconUrl(url) {
  try { return 'https://www.google.com/s2/favicons?sz=32&domain_url=' + encodeURIComponent(new URL(url).origin) }
  catch { return '' }
}

function faviconImgTag(url, emoji, cls) {
  const fav = url ? faviconUrl(url) : null
  if (!fav) return `<span class="tool-icon-fallback">${emoji}</span>`
  return `<img src="${esc(fav)}" class="${cls}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display=''">`
       + `<span style="display:none">${emoji}</span>`
}

// ── SEARCH STATE ──
let searchQuery = ''

// ── MAIN GRID ──
function renderMain() {
  const grid = document.getElementById('customToolsGrid')
  const label = document.getElementById('myToolsLabel')
  const searchBar = document.getElementById('searchBar')
  if (!grid) return
  
  const q = searchQuery.toLowerCase()
  
  // If searching, we might want to update the entire launchpad or just the custom tools.
  // For now, let's keep it simple and just update the custom tools grid as before,
  // but ensure it uses the correct filtering logic.
  
  const allMain = tools.filter(t => !['Apps', 'Dev', 'Panel'].includes(t.group))
  
  if (!allMain.length && !q) {
    if (label) label.style.display = 'none'
    if (searchBar) searchBar.style.display = 'none'
    grid.innerHTML = ''
    return
  }
  
  if (label) label.style.display = 'flex'
  if (searchBar) searchBar.style.display = 'flex'

  const mainTools = q ? allMain.filter(t => t.name.toLowerCase().includes(q) || t.group.toLowerCase().includes(q) || t.url.toLowerCase().includes(q)) : allMain

  if (!mainTools.length && q) {
    grid.innerHTML = '<div class="search-no-results">No links match your search.</div>'
    return
  }
  
  grid.innerHTML = mainTools.map(t => `
    <div class="custom-tool-card">
      <span class="tool-icon">${faviconImgTag(t.url, t.icon, 'favicon-img')}</span>
      <span class="custom-tool-label">${esc(t.name)}</span>
      <div class="custom-tool-actions">
        <a class="tool-action-btn" href="${esc(t.url)}" target="_blank" rel="noopener" title="Open in new tab">↗</a>
      </div>
    </div>`).join('')
}

// ── LINK MANAGER ──
function renderList() {
  const list = document.getElementById('linksList')
  if (!list) return
  list.innerHTML = ''
  const shown = filterGroup === 'all' ? tools : tools.filter(t => t.group === filterGroup)
  if (!shown.length) { list.innerHTML = '<div class="empty-list">No links yet.</div>'; return }
  
  shown.forEach((t, si) => {
    const isActivePanel = panelLayout.includes(t.id);
    
    const row = document.createElement('div')
    row.className = 'link-row' + (isActivePanel ? ' active-panel' : '')
    row.innerHTML = `
      <span class="link-row-icon">${faviconImgTag(t.url, t.icon, 'link-row-favicon')}</span>
      <div class="link-row-info">
        <div class="link-row-name">${esc(t.name)}</div>
        <div class="link-row-meta">${esc(t.group)} · ${esc(shortUrl(t.url))}</div>
      </div>
      <div class="link-row-actions">
        <button class="panel-toggle-btn ${isActivePanel ? 'active' : ''}" data-id="${t.id}" title="${isActivePanel ? 'Remove from Workspace' : 'Pin to Workspace'}">
          ${isActivePanel ? 'Pinned' : 'Pin'}
        </button>
        <button class="icon-btn edit-btn" data-id="${t.id}" title="Edit">✎</button>
        <button class="icon-btn mv up" data-si="${si}" title="Move up"${si === 0 ? ' disabled style="opacity:0.3;cursor:default"' : ''}>↑</button>
        <button class="icon-btn mv dn" data-si="${si}" title="Move down"${si === shown.length - 1 ? ' disabled style="opacity:0.3;cursor:default"' : ''}>↓</button>
        <button class="icon-btn del" data-id="${t.id}" title="Delete">✕</button>
      </div>`
    
    const editForm = document.createElement('div');
    editForm.className = 'link-edit-form';
    editForm.id = `edit-form-${t.id}`;
    editForm.innerHTML = `
        <div class="form-field">
            <div class="form-label">Name</div>
            <input class="form-input" id="edit-name-${t.id}" value="${esc(t.name)}">
        </div>
        <div class="form-field">
            <div class="form-label">URL</div>
            <input class="form-input" id="edit-url-${t.id}" value="${esc(t.url)}">
        </div>
        <div class="form-field">
            <div class="form-label">Icon</div>
            <input class="form-input" id="edit-icon-${t.id}" value="${esc(t.icon)}" maxlength="8">
        </div>
        <div class="form-field">
            <div class="form-label">Section</div>
            <select class="form-input" id="edit-group-${t.id}">
                ${GROUPS.map(g => `<option value="${g}" ${g === t.group ? 'selected' : ''}>${g}</option>`).join('')}
            </select>
        </div>
        <div class="edit-actions">
            <button class="btn-save-edit" data-id="${t.id}">Save</button>
            <button class="btn-cancel-edit" data-id="${t.id}">Cancel</button>
        </div>
    `;

    list.appendChild(row)
    list.appendChild(editForm)
  })

  // Panel Toggles
  list.querySelectorAll('.panel-toggle-btn').forEach(b => b.addEventListener('click', e => {
    const id = e.currentTarget.dataset.id;
    if (panelLayout.includes(id)) {
        panelLayout = panelLayout.filter(p => p !== id);
        delete panelSizes[id];
    } else {
        panelLayout.push(id);
        panelSizes[id] = 0.3; // Default width
    }
    renderPanels();
    renderList();
    savePanelLayout();
  }));

  // Edit Toggles
  list.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', e => {
    const id = e.currentTarget.dataset.id;
    document.getElementById(`edit-form-${id}`).classList.toggle('open');
  }));

  list.querySelectorAll('.btn-cancel-edit').forEach(b => b.addEventListener('click', e => {
    const id = e.currentTarget.dataset.id;
    document.getElementById(`edit-form-${id}`).classList.remove('open');
  }));

  list.querySelectorAll('.btn-save-edit').forEach(b => b.addEventListener('click', async e => {
    const id = e.currentTarget.dataset.id;
    const name = document.getElementById(`edit-name-${id}`).value.trim();
    const url = document.getElementById(`edit-url-${id}`).value.trim();
    const icon = document.getElementById(`edit-icon-${id}`).value.trim();
    const group = document.getElementById(`edit-group-${id}`).value;
    if (!name || !url) return;

    e.currentTarget.textContent = 'Saving...';
    try {
        const updated = await apiFetch(`/api/links/${id}`, {
            method: 'PUT',
            body: JSON.stringify({ name, url, icon, group })
        });
        const idx = tools.findIndex(t => t.id === id);
        tools[idx] = updated;
        
        // If moved to Panel group and not in layout, add it
        if (group === 'Panel' && !panelLayout.includes(id)) {
            panelLayout.push(id);
            panelSizes[id] = 0.3;
        }
        // If moved out of Panel group, remove from layout
        if (group !== 'Panel' && panelLayout.includes(id)) {
            panelLayout = panelLayout.filter(p => p !== id);
            delete panelSizes[id];
        }

        derivePanelTools();
        renderMain();
        renderList();
        renderFilterTabs();
        renderPanels();
        savePanelLayout();
    } catch (err) {
        alert('Failed to save link changes');
        e.currentTarget.textContent = 'Save';
    }
  }));

  list.querySelectorAll('.del').forEach(b => b.addEventListener('click', async e => {
    const id = e.currentTarget.dataset.id
    const link = tools.find(t => t.id === id)
    if (!confirm(`Delete "${link?.name || 'this link'}"?`)) return
    try {
      await apiFetch('/api/links/' + id, { method: 'DELETE' })
      tools = tools.filter(t => t.id !== id)
      panelLayout = panelLayout.filter(p => p !== id);
      delete panelSizes[id];
      
      derivePanelTools(); 
      initResizableLayout();
      renderList(); 
      renderFilterTabs();
      savePanelLayout();
    } catch(err) { alert('Could not delete — check connection') }
  }))
  list.querySelectorAll('.up').forEach(b => b.addEventListener('click', async e => {
    const si = +e.currentTarget.dataset.si; if (si === 0) return
    const a = tools.indexOf(shown[si - 1]), b2 = tools.indexOf(shown[si])
    ;[tools[a], tools[b2]] = [tools[b2], tools[a]]
    derivePanelTools(); renderList(); await batchReorder()
  }))
  list.querySelectorAll('.dn').forEach(b => b.addEventListener('click', async e => {
    const si = +e.currentTarget.dataset.si; if (si >= shown.length - 1) return
    const a = tools.indexOf(shown[si]), b2 = tools.indexOf(shown[si + 1])
    ;[tools[a], tools[b2]] = [tools[b2], tools[a]]
    derivePanelTools(); renderList(); await batchReorder()
  }))
}

async function batchReorder() {
  const items = tools.map((t, pos) => ({ id: t.id, position: pos }))
  try { await apiFetch('/api/links/reorder', { method: 'PUT', body: JSON.stringify({ items }) }) } catch(e) {}
}

function renderEmojis() {
  const p = document.getElementById('emojiPicker'); if(!p) return; p.innerHTML = ''
  EMOJIS.forEach(e => {
    const b = document.createElement('button')
    b.className = 'emoji-opt'+(e===selectedEmoji?' selected':''); b.textContent = e; b.type = 'button'
    b.addEventListener('click', () => { selectedEmoji = e; renderEmojis() }); p.appendChild(b)
  })
}

function renderAddTabs() {
  const c = document.getElementById('groupTabsAdd'); if(!c) return; c.innerHTML = ''
  GROUPS.forEach(g => {
    const b = document.createElement('button')
    b.className = 'group-tab'+(g===addGroup?' active':''); b.textContent = g; b.type = 'button'
    b.addEventListener('click', () => { addGroup = g; renderAddTabs() }); c.appendChild(b)
  })
}

function renderFilterTabs() {
  const c = document.getElementById('groupTabsFilter'); if(!c) return; c.innerHTML = ''
  const makeTab = (val, label) => {
    const b = document.createElement('button')
    b.className = 'group-tab'+(filterGroup===val?' active':''); b.textContent = label; b.type = 'button'
    b.addEventListener('click', () => { filterGroup = val; renderFilterTabs(); renderList() }); c.appendChild(b)
  }
  makeTab('all','All')
  ;[...new Set(tools.map(t=>t.group))].forEach(g => makeTab(g,g))
}

function validateForm() {
  const url = document.getElementById('inputUrl').value.trim()
  const name = document.getElementById('inputName').value.trim()
  const btn = document.getElementById('btnAdd')
  if (btn) btn.disabled = !(name && (url.startsWith('http://') || url.startsWith('https://')))
}

document.getElementById('inputUrl').addEventListener('input', e => {
  validateForm()
  const nameEl = document.getElementById('inputName')
  if (nameEl.value.trim()) return
  try {
    const u = new URL(e.target.value.trim())
    const raw = u.hostname.replace('www.','').split('.')[0].replace(/-/g,' ')
    nameEl.value = raw.replace(/\b\w/g, c => c.toUpperCase()); validateForm()
  } catch(_) {}
})
document.getElementById('inputName').addEventListener('input', validateForm)

document.getElementById('btnAdd').addEventListener('click', async () => {
  const url = document.getElementById('inputUrl').value.trim()
  const name = document.getElementById('inputName').value.trim()
  if (!url || !name) return
  const btn = document.getElementById('btnAdd')
  const errEl = document.getElementById('addError')
  btn.textContent = 'Saving…'; btn.classList.add('saving'); btn.disabled = true; errEl.style.display = 'none'
  try {
    const link = await apiFetch('/api/links', { method: 'POST', body: JSON.stringify({ name, url, icon: selectedEmoji, group: addGroup }) })
    tools.push(link); 
    
    // Automatically add to layout if it's a Panel link
    if (addGroup === 'Panel' && !panelLayout.includes(link.id)) {
        panelLayout.push(link.id);
        panelSizes[link.id] = 0.3;
    }

    derivePanelTools(); 
    initResizableLayout(); // This will handle re-rendering panels and layout
    renderList(); 
    renderFilterTabs();
    savePanelLayout();

    document.getElementById('inputUrl').value = ''; document.getElementById('inputName').value = ''
    selectedEmoji = EMOJIS[0]; renderEmojis()
  } catch(e) { errEl.textContent = 'Could not save — check API connection'; errEl.style.display = 'block' }
  finally { btn.textContent = 'Add Link'; btn.classList.remove('saving'); validateForm() }
})

function openAdmin() { 
  document.getElementById('adminSidebar').classList.add('open'); 
  document.getElementById('adminOverlay').classList.add('open'); 
  const lp = document.getElementById('launchpad');
  if (lp) lp.classList.add('dimmed'); 
  renderFilterTabs(); 
  renderList() 
}
function closeAdmin() { 
  document.getElementById('adminSidebar').classList.remove('open'); 
  document.getElementById('adminOverlay').classList.remove('open'); 
  const lp = document.getElementById('launchpad');
  if (lp) lp.classList.remove('dimmed'); 
}
document.getElementById('adminBtn').addEventListener('click', openAdmin)
document.getElementById('adminClose').addEventListener('click', closeAdmin)
document.getElementById('adminOverlay').addEventListener('click', closeAdmin)

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  const adminOpen = document.getElementById('adminSidebar').classList.contains('open')
  const inInput = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)

  if (e.key === 'Escape') {
    const searchInput = document.getElementById('searchInput');
    if (document.activeElement === searchInput) {
      searchInput.blur()
      return
    }
    if (adminOpen) { closeAdmin(); return }
  }

  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault()
    document.getElementById('searchInput')?.focus()
    return
  }

  if (e.key === '/' && !inInput) {
    e.preventDefault()
    document.getElementById('searchInput')?.focus()
    return
  }
})

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function shortUrl(url) { try { return new URL(url).hostname } catch(e) { return url.slice(0,28) } }
</script>
